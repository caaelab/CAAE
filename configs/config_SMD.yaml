data:
  dataset_name: SMD
  data_path: ./data/SMD/
  window_size: 24
  step_size: 2

experiment:
  name: smd

training:
  batch_size: 64
  shuffle: true
  learning_rate: 0.001
  num_epochs: 60
  device: cuda
  weight_decay: 1e-5
  rec: 1.0
  con: 0.02
  adv: 0.1

dbpm:
  beta_np: 1.0
  beta_fp: 1.0
  warmup_epochs: 5

anomaly:
  num_anomalies_per_sample: 8
  noise_sigma: 0.05

contrastive:
  temperature: 0.1
  recon_margin: 0.5

evaluation:
  gmm_components: 0
  score_level: point
  smoothing:
    method: median
    kernel: 25
  score_postprocess:
    mode: close_open
    kernel: 29
    fixed_alpha: 0.1

model:
  encoder:
    input_dim: 38
    proj_dim: 40
    hidden_dim: 20
    nhead: 4
    num_layers: 4
    dim_feedforward: 128
    dropout: 0.1
  decoder:
    hidden_dim: 20
    output_dim: 38
  discriminator:
    hidden_dim: 38
    output_dim: 1
