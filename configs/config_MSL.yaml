data:
  dataset_name: MSL
  data_path: ./data/MSL/
  window_size: 24
  step_size: 2
experiment:
  name: MSL
training:
  batch_size: 64
  shuffle: true
  learning_rate: 0.001
  num_epochs: 60
  device: cuda
  weight_decay: 1e-5
dbpm:
  beta_np: 1.0
  beta_fp: 1.0
  warmup_epochs: 5
anomaly:
  num_anomalies_per_sample: 8
  noise_sigma: 0.05
contrastive:
  temperature: 0.1
  recon_margin: 0.5
evaluation:
  score_level: point
model:
  encoder:
    input_dim: 55
    proj_dim: 60
    hidden_dim: 28
    nhead: 4
    num_layers: 4
    dim_feedforward: 128
    dropout: 0.1
  decoder:
    hidden_dim: 28
    output_dim: 55
  discriminator:
    hidden_dim: 55
    output_dim: 1
